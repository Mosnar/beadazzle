name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to publish, such as v1.0.0
        required: true
        type: string
      target_ref:
        description: Git ref or SHA to package when running manually
        required: false
        type: string
      build_number:
        description: Optional CFBundleVersion override
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.release_tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: macos-26
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      target_ref: ${{ steps.release.outputs.target_ref }}
      build_number: ${{ steps.release.outputs.build_number }}
    steps:
      - name: Resolve release context
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
            target_ref="${{ inputs.target_ref }}"
            build_number="${{ inputs.build_number }}"

            if [[ -z "$target_ref" ]]; then
              target_ref="$GITHUB_SHA"
            fi
          else
            release_tag="$GITHUB_REF_NAME"
            target_ref="$GITHUB_REF"
            build_number=""
          fi

          if [[ -z "$release_tag" ]]; then
            echo "::error::Release tag is required." >&2
            exit 1
          fi

          if [[ -z "$build_number" ]]; then
            build_number="$GITHUB_RUN_NUMBER"
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "target_ref=$target_ref" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.target_ref }}

      - name: Verify changelog section exists
        shell: bash
        run: ./script/extract_changelog.sh --version "${{ steps.release.outputs.release_tag }}" >/dev/null

      - name: Run Swift tests
        shell: bash
        run: swift test

      - name: Verify release metadata helper
        shell: bash
        run: ./script/test_release_common.sh

      - name: Verify appcast validation
        shell: bash
        run: python3 -m unittest script/test_validate_appcast.py

  publish:
    needs: validate
    runs-on: macos-26
    environment: public-release
    permissions:
      contents: write
    env:
      DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
      APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
      APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
      BEADAZZLE_SPARKLE_PUBLIC_KEY: ${{ vars.SPARKLE_ED_PUBLIC_KEY }}
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      # Keep in sync with the Sparkle version pinned in Package.swift so the
      # generate_appcast tool matches the embedded framework.
      SPARKLE_TOOLS_VERSION: "2.9.4"
    steps:
      - name: Validate release secrets
        shell: bash
        run: |
          set -euo pipefail

          for variable_name in \
            DEVELOPER_ID_APPLICATION \
            APPLE_DEVELOPER_ID_P12_BASE64 \
            APPLE_DEVELOPER_ID_P12_PASSWORD \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            BEADAZZLE_SPARKLE_PUBLIC_KEY \
            SPARKLE_ED_PRIVATE_KEY; do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "::error::Missing required secret or environment value: $variable_name" >&2
              exit 1
            fi
          done

      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.target_ref }}

      - name: Import Developer ID certificate
        id: keychain
        shell: bash
        run: |
          set -euo pipefail

          cert_path="$RUNNER_TEMP/beadazzle-developer-id.p12"
          keychain_path="$RUNNER_TEMP/beadazzle-release.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$APPLE_DEVELOPER_ID_P12_BASE64" | /usr/bin/base64 -D -o "$cert_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          echo "keychain_path=$keychain_path" >> "$GITHUB_OUTPUT"

      - name: Build signed app bundle
        id: build_app
        shell: bash
        run: |
          set -euo pipefail

          app_bundle="$(./script/build_app_bundle.sh \
            --release-tag "${{ needs.validate.outputs.release_tag }}" \
            --build-number "${{ needs.validate.outputs.build_number }}" \
            --codesign-identity "$DEVELOPER_ID_APPLICATION" \
            --configuration release)"

          echo "app_bundle=$app_bundle" >> "$GITHUB_OUTPUT"

      - name: Notarize app bundle
        shell: bash
        run: |
          set -euo pipefail
          ./script/notarize_release.sh --app-bundle "${{ steps.build_app.outputs.app_bundle }}"

      - name: Create signed DMG
        id: create_dmg
        shell: bash
        run: |
          set -euo pipefail

          dmg_output="$(./script/create_release_dmg.sh \
            --release-tag "${{ needs.validate.outputs.release_tag }}" \
            --build-number "${{ needs.validate.outputs.build_number }}" \
            --codesign-identity "$DEVELOPER_ID_APPLICATION" \
            --configuration release \
            --app-bundle "${{ steps.build_app.outputs.app_bundle }}")"

          dmg_path="$(printf '%s\n' "$dmg_output" | sed -n '1p')"
          checksum_path="$(printf '%s\n' "$dmg_output" | sed -n '2p')"

          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$checksum_path" >> "$GITHUB_OUTPUT"

      - name: Notarize DMG and refresh checksum
        shell: bash
        run: |
          set -euo pipefail
          ./script/notarize_release.sh \
            --dmg-path "${{ steps.create_dmg.outputs.dmg_path }}" \
            --checksum-path "${{ steps.create_dmg.outputs.checksum_path }}"

      - name: Prepare release notes from changelog
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          notes_md="$RUNNER_TEMP/release-notes.md"
          notes_html="$RUNNER_TEMP/release-notes.html"

          # Fails the release if the tag has no matching CHANGELOG.md section.
          ./script/extract_changelog.sh --version "$RELEASE_TAG" > "$notes_md"

          # Render to HTML (GitHub-flavored) for the Sparkle update dialog.
          gh api --method POST /markdown \
            -f mode=gfm \
            -f context="${GITHUB_REPOSITORY}" \
            -f "text=$(cat "$notes_md")" > "$notes_html"

          echo "notes_md=$notes_md" >> "$GITHUB_OUTPUT"
          echo "notes_html=$notes_html" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          TARGET_REF: ${{ needs.validate.outputs.target_ref }}
          DMG_PATH: ${{ steps.create_dmg.outputs.dmg_path }}
          CHECKSUM_PATH: ${{ steps.create_dmg.outputs.checksum_path }}
          NOTES_MD: ${{ steps.notes.outputs.notes_md }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DMG_PATH" "$CHECKSUM_PATH" --clobber
          else
            release_args=(release create "$RELEASE_TAG" "$DMG_PATH" "$CHECKSUM_PATH" --title "$RELEASE_TAG" --notes-file "$NOTES_MD")

            # A semver pre-release identifier (e.g. -beta.1, -rc.1) always contains a hyphen.
            if [[ "$RELEASE_TAG" == *-* ]]; then
              release_args+=(--prerelease)
            fi

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              release_args+=(--target "$TARGET_REF")
            else
              release_args+=(--verify-tag)
            fi

            gh "${release_args[@]}"
          fi

      - name: Install Sparkle appcast tools
        id: sparkle_tools
        shell: bash
        run: |
          set -euo pipefail

          tools_dir="$RUNNER_TEMP/sparkle-tools"
          mkdir -p "$tools_dir"
          archive="$RUNNER_TEMP/sparkle-tools.tar.xz"

          curl -fsSL \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TOOLS_VERSION}/Sparkle-${SPARKLE_TOOLS_VERSION}.tar.xz" \
            -o "$archive"
          tar -xf "$archive" -C "$tools_dir" bin/generate_appcast

          generate_appcast="$tools_dir/bin/generate_appcast"
          chmod +x "$generate_appcast"
          echo "generate_appcast=$generate_appcast" >> "$GITHUB_OUTPUT"

      - name: Build appcast
        id: appcast
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          BUILD_NUMBER: ${{ needs.validate.outputs.build_number }}
          DMG_PATH: ${{ steps.create_dmg.outputs.dmg_path }}
          NOTES_HTML: ${{ steps.notes.outputs.notes_html }}
          GENERATE_APPCAST: ${{ steps.sparkle_tools.outputs.generate_appcast }}
        shell: bash
        run: |
          set -euo pipefail

          site_dir="$GITHUB_WORKSPACE/appcast-site"
          ./script/build_appcast.sh \
            --dmg-path "$DMG_PATH" \
            --release-tag "$RELEASE_TAG" \
            --build-number "$BUILD_NUMBER" \
            --notes-html "$NOTES_HTML" \
            --generate-appcast "$GENERATE_APPCAST" \
            --output-dir "$site_dir"

          echo "site_dir=$site_dir" >> "$GITHUB_OUTPUT"

      - name: Upload appcast as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.appcast.outputs.site_dir }}

      - name: Remove temporary signing keychain
        if: always() && steps.keychain.outputs.keychain_path != ''
        shell: bash
        run: security delete-keychain "${{ steps.keychain.outputs.keychain_path }}"

  deploy_appcast:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy appcast to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
